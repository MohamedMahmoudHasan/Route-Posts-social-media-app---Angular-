            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-[17px] leading-relaxed text-slate-800 outline-none transition focus:border-[#1877f2] focus:bg-white"
          ></textarea>
        </div>
        @if (imgUrl) {
          <div class="relative mt-2">
            <img
              alt="Preview"
              class="max-h-60 w-full rounded-lg object-cover"
              [src]="imgUrl"
            /><button
              (click)="clearPreview($event)"
              class="absolute right-2 top-2 rounded-full bg-black/60 p-1 text-white backdrop-blur-sm"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"

                aria-hidden="true"
              >
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
        }
        <div
          class="mt-3 flex flex-wrap items-center justify-between gap-2 border-t border-border pt-3"
        >
          <div class="relative flex items-center gap-2">
            <label
              class="flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"

                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"

            ><button
              type="button"
              class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"

              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"

                <line x1="15" x2="15.01" y1="9" y2="9"></line></svg
              ><span class="hidden sm:inline">Feeling/activity</span>
            </button>
          </div>
          <div class="flex items-center gap-3">
            <button
              class="flex items-center gap-2 rounded-lg bg-[#1877f2] px-5 py-2 text-sm font-extrabold text-white shadow-sm transition-colors hover:bg-[#166fe5] disabled:opacity-60"

              Post<svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"

                ></path>
                <path d="m21.854 2.147-10.94 10.939"></path>
              </svg>
            </button>
          </div>
        </div>
      </form>

      <div class="space-y-4">
        @for (post of postList; track post._id) {
          <app-post (deleteItemId)="deletePostItem($event)" [post]="post"></app-post>
        }
      </div>
    </section>
