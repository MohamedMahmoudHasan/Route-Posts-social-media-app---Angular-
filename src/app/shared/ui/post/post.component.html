<article
  [routerLink]="['/details', post._id]"
  class="w-full bg-white border border-slate-200 rounded-xl p-4 mb-4 flex gap-3 hover:bg-slate-50/50 transition-colors cursor-pointer"
>
  <div class="shrink-0">
    <div class="h-10 w-10 rounded-full overflow-hidden border border-slate-100 shadow-sm">
      <img [alt]="post.user.name" class="h-full w-full object-cover" [src]="post.user.photo" />
    </div>
  </div>

  <div class="flex-1 flex flex-col gap-2">
    <div class="relative flex items-center justify-between">
      <div class="flex items-center gap-1.5 flex-wrap">
        <span class="font-bold text-[15px] text-slate-900 hover:underline">{{
          post.user.name
        }}</span>
        <span class="text-slate-500 text-sm"
          >@{{ post.user.username }} · {{ post.createdAt | timeAgo }}</span
        >
      </div>
      @if (post.user._id === userId) {
        <button
          class="peer text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-100 transition"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-ellipsis"
          >
            <circle cx="12" cy="12" r="1" />
            <circle cx="19" cy="12" r="1" />
            <circle cx="5" cy="12" r="1" />
          </svg>
        </button>
        <div
          class="absolute hidden peer-hover:block hover:block top-full right-0 z-20 w-44 rounded-xl border border-slate-200 bg-white py-1 shadow-lg before:content-[''] before:absolute before:-top-4 before:left-0 before:w-full before:h-4"
        >
          <button
            (click)="$event.stopPropagation(); editPost()"
            class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm font-semibold text-slate-700 hover:bg-slate-50"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-pencil"
              aria-hidden="true"
            >
              <path
                d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"
              ></path>
              <path d="m15 5 4 4"></path></svg
            >Edit post</button
          ><button
            (click)="deletePostItem(post._id); $event.stopPropagation()"
            class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm font-semibold text-rose-600 hover:bg-rose-50"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-trash2 lucide-trash-2"
              aria-hidden="true"
            >
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
              <path d="M3 6h18"></path>
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg
            >Delete post
          </button>
        </div>
      }
    </div>
    @if (post.body && !postEdit) {
      <div class="text-[15px] leading-normal text-slate-800">
        <p class="whitespace-pre-wrap">{{ post.body }}</p>
      </div>
    }
    @if (postEdit) {
      <form #form (submit)="updatePost($event, form)" class="relative">
        <textarea
          (click)="$event.stopPropagation()"
          [formControl]="content"
          rows="2"
          class="resize-none w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-[17px] leading-relaxed text-slate-800 outline-none transition focus:border-[#1877f2] focus:bg-white"
        ></textarea>
        <button
          (click)="$event.stopPropagation()"
          class="absolute bottom-[15%] end-[1%] p-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition shadow-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="19" x2="12" y2="5" />
            <polyline points="5 12 12 5 19 12" />
          </svg>
        </button>
      </form>
    }
    @if (post.image) {
      <div class="mt-2 rounded-2xl overflow-hidden border border-slate-200">
        <img
          [alt]="post.user.name"
          class="w-full h-auto max-h-[500px] object-cover"
          [src]="post.image"
        />
      </div>
    }

    <div class="flex items-center justify-between max-w-xs mt-2 pt-1 text-slate-500">
      <button
        #likeBtn
        (click)="$event.stopPropagation(); likePost(post._id)"
        [class.text-rose-600]="post.likes.includes(userId)"
        class="group flex items-center gap-1 transition hover:text-rose-600"
      >
        <div class="p-2 rounded-full group-hover:bg-rose-50 transition">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-heart"
          >
            <path
              d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
            />
          </svg>
        </div>
        <span #likeCount class="text-xs">{{ post.likesCount }}</span>
      </button>

      <button
        #commentBtn
        (click)="$event.stopPropagation()"
        class="group flex items-center gap-1 transition hover:text-sky-600"
      >
        <div class="p-2 rounded-full group-hover:bg-sky-50 transition">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-message-circle"
          >
            <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
          </svg>
        </div>
        <span #commentCount class="text-xs">{{ post.commentsCount }}</span>
      </button>

      <button
        (click)="$event.stopPropagation()"
        class="group flex items-center gap-1 transition hover:text-teal-600"
      >
        <div class="p-2 rounded-full group-hover:bg-teal-50 transition">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-repeat-2"
          >
            <path d="m2 9 3-3 3 3" />
            <path d="M13 18H7a2 2 0 0 1-2-2V6" />
            <path d="m22 15-3 3-3-3" />
            <path d="M11 6h6a2 2 0 0 1 2 2v10" />
          </svg>
        </div>
        <span class="text-xs">{{ post.sharesCount }}</span>
      </button>

      <button
        (click)="$event.stopPropagation()"
        class="group flex items-center transition hover:text-amber-600"
      >
        <div class="p-2 rounded-full group-hover:bg-amber-50 transition">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="19"
            height="19"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-share"
          >
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
            <polyline points="16 6 12 2 8 6" />
            <line x1="12" x2="12" y1="2" y2="15" />
          </svg>
        </div>
      </button>
    </div>
    @defer (on interaction(commentBtn)) {
      <app-comment [postId]="post._id" (setCommentsCount)="updateCount($event)"></app-comment>
    }
  </div>
</article>
